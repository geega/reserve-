version: '3.9'

services:
  reserveminus:
    build:
      context: ./docker/php
    container_name: php-reserveminus
    volumes:
      - ./pwa:/var/www
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geega-reserve.rule=Host(`s.reserve.geega.net`)"
      - "traefik.http.routers.geega-reserve.entrypoints=websecure"
      - "traefik.http.services.geega-reserve.loadbalancer.server.port=80"
    environment:
      - AA_TOKEN=abc
    networks:
      - traefik-net
networks:
  traefik-net:
    external: true