<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Резерв ID</title>
  <!-- <link rel="stylesheet" href="style.css" /> -->
   <style>
    * {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  margin: 0;
  background: #e7e5d6;
}

.app {
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.alert {
  background: #d92c00;
  color: #fff;
  text-align: center;
  font-weight: 600;
  padding: 12px;
}

.card {
  background: #e7e5d6;
  padding: 20px;
  border-bottom: 1px solid #cfcdbf;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  margin: 0;
  font-size: 26px;
}

.logo {
  font-size: 26px;
}

.label {
  color: #6b6b6b;
  font-size: 14px;
}

.value {
  display: block;
  font-size: 20px;
  margin-top: 4px;
}

.name {
  margin-top: 10px;
  font-size: 22px;
  font-weight: 600;
  line-height: 1.3;
}

/* 🔴 Бігуща стрічка */
.ticker {
  background: #d92c00;
  color: #fff;
  overflow: hidden;
  white-space: nowrap;
}

.ticker__inner {
  display: inline-block;
  padding: 10px 0;
  animation: ticker 12s linear infinite;
}

@keyframes ticker {
  0% {
    transform: translateX(100%);
  }
  100% {
    transform: translateX(-100%);
  }
}

/* Нижнє меню */
.bottom-nav {
  margin-top: auto;
  display: flex;
  border-top: 1px solid #ccc;
  background: #fff;
}

.bottom-nav div {
  flex: 1;
  text-align: center;
  padding: 12px 0;
  font-size: 14px;
}

.bottom-nav .active {
  font-weight: 600;
}

   </style>
</head>
<body>

<div class="app">

  <div class="alert">
    ВАС РОЗШУКУЄ ТЦК
  </div>

  <div class="card">
    <div class="header">
      <h1>Резерв ID</h1>
      <span class="logo">🇺🇦</span>
    </div>

    <div class="info">
      <span class="label">Дата народження:</span>
      <span class="value">23.06.1987</span>
    </div>
  </div>

  <div class="ticker">
    <div class="ticker__inner">
      ⏱ 18:15 | 20.01.2026 • Документ оновлено о 18:15 | 20.01.2026 •
    </div>
  </div>

  <div class="card">
    <div class="label">Військовозобов’язаний</div>
    <div class="name">
      Варпіховський<br>
      Святослав<br>
      Леонідович
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="active">Резерв ID</div>
    <div>Вакансії</div>
    <div>Меню</div>
  </nav>

</div>

</body>
</html>
