<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Резерв+</title>
  <style>
    :root {
      --bg: #dcd9c6;
      --card: #d6d3bf;
      --text: #1f1f1f;
      --muted: #6b6b6b;
      --accent: #f29a1f;
      --brown: #7a5a2b;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Inter, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 390px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
    }

    .logo span {
      color: var(--accent);
    }

    .menu {
      font-size: 24px;
      cursor: pointer;
    }

    /* Card */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .info-row {
      margin-bottom: 10px;
      font-size: 14px;
    }

    .info-row span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    /* Status bar */
    .status {
      margin: 16px -16px;
      padding: 8px 16px;
      background: var(--brown);
      color: #fff;
      font-size: 12px;
    }

    /* Person card */
    .person {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 16px;
    }

    .person-name {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.1;
    }

    .add-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">Резерв<span>+</span></div>
      <div class="menu">☰</div>
    </header>

    <section class="card">
      <div class="card-title">
        Інформація<br />
        з реєстру<br />
        Оберіг
      </div>

      <div class="info-row">
        <span>Дата народження:</span>
        24.08.1996
      </div>

      <div class="info-row">
        <span>Бронювання до:</span>
        31.12.2024
      </div>
    </section>

    <div class="status">
      На обліку • Дані оновлені о 18:42 | 24.05
    </div>

    <section class="person">
      <div class="person-name">
        Українець<br />
        Ярослав<br />
        Ігорович
      </div>
      <div class="add-btn">+</div>
    </section>
  </div>
</body>
</html>
