<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Mock Screen</title>
    <link rel="stylesheet" href="/temp/styles.css" />
  </head>

  <body>
    <div class="app">
      <header class="topbar">
        <button class="notifyBtn" type="button" aria-label="Сповіщення">
          <span class="notifyBtn__text">Сповіщення</span>
          <span class="notifyBtn__icon" aria-hidden="true">
            <!-- Bell icon (inline SVG) -->
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
              <path
                d="M12 22a2.25 2.25 0 0 0 2.2-1.7h-4.4A2.25 2.25 0 0 0 12 22Z"
                fill="currentColor"
              />
              <path
                d="M20 17.2c-1.4-1.2-2.1-2-2.1-6.1 0-3.7-2.3-6.2-5.6-6.9V3.2a.3.3 0 0 0-.3-.3h-1.9a.3.3 0 0 0-.3.3v1c-3.3.7-5.6 3.2-5.6 6.9 0 4.1-.7 4.9-2.1 6.1-.3.3-.1.8.3.8h17.1c.4 0 .6-.6.2-.8Z"
                fill="currentColor"
              />
            </svg>
          </span>
        </button>
      </header>

      <main class="content" role="main">
        <section class="card" aria-label="Loading card">
          <div class="card__inner">
            <div class="emblem" aria-hidden="true">
              <!-- Trident-like placeholder emblem -->
              <svg viewBox="0 0 64 64" width="44" height="44">
                <path
                  d="M18 12h28v17c0 13-9.2 22.7-14 24.9C27.2 51.7 18 42 18 29V12Z"
                  fill="#0B0B0B"
                />
                <path
                  d="M32 18c2.6 0 4.2 1.9 4.2 4.7v16.7h3.7V22.6c0-4.9-3.1-8-7.9-8-4.8 0-7.9 3.1-7.9 8v16.8h3.7V22.7c0-2.8 1.6-4.7 4.2-4.7Z"
                  fill="#D9D6C4"
                />
                <path
                  d="M32 22.5l4.8 6.7-4.8 7-4.8-7 4.8-6.7Z"
                  fill="#D9D6C4"
                />
              </svg>
            </div>

            <h1 class="title">
              Отримуємо<br />
              інформацію<br />
              з реєстру
            </h1>

            <p class="subtitle">
              Поки ми шукаємо дані –<br />
              перегляньте вакансії у Силах<br />
              оборони
            </p>
          </div>
        </section>
      </main>

      <nav class="tabbar" aria-label="Bottom navigation">
        <a class="tab tab--left" href="#" aria-label="Резерв ID">
          <span class="tab__icon" aria-hidden="true">
            <span class="i i--menu"></span>
          </span>
          <span class="tab__label">Резерв ID</span>
        </a>

        <a class="tab tab--active" href="#" aria-current="page" aria-label="Вакансії">
          <span class="tab__icon tab__icon--boxed" aria-hidden="true">
            <span class="i i--drop"></span>
          </span>
          <span class="tab__label">Вакансії</span>
        </a>

        <a class="tab tab--right" href="#" aria-label="Меню">
          <span class="tab__icon" aria-hidden="true">
            <span class="i i--menu"></span>
          </span>
          <span class="tab__label">Меню</span>
        </a>
      </nav>
    </div>
  </body>
</html>
